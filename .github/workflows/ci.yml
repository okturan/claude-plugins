name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Validate marketplace contract
        run: node scripts/validate-marketplace.mjs

      - name: Verify marketplace visual proof
        run: node scripts/render-marketplace-proof.mjs --check

      - name: Check shell syntax
        run: bash -n plugins/files-organizer/scripts/*.sh scripts/test-files-organizer.sh

      - name: Lint shell scripts
        if: runner.os == 'Linux'
        run: shellcheck plugins/files-organizer/scripts/*.sh scripts/test-files-organizer.sh

      - name: Test file-organizer helpers
        run: bash scripts/test-files-organizer.sh
